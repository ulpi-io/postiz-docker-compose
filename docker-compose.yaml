x-postiz-environment: &postiz-environment
  MAIN_URL: "${POSTIZ_URL:-https://postiz.con.fyi}"
  FRONTEND_URL: "${POSTIZ_URL:-https://postiz.con.fyi}"
  NEXT_PUBLIC_BACKEND_URL: "${POSTIZ_URL:-https://postiz.con.fyi}/api"
  JWT_SECRET: "${JWT_SECRET:?JWT_SECRET is required}"
  DATABASE_URL: "postgresql://${POSTIZ_POSTGRES_USER:-postiz-user}:${POSTIZ_POSTGRES_PASSWORD:?POSTIZ_POSTGRES_PASSWORD is required}@postiz-postgres:5432/${POSTIZ_POSTGRES_DB:-postiz}"
  REDIS_URL: "redis://:${POSTIZ_REDIS_PASSWORD:?POSTIZ_REDIS_PASSWORD is required}@postiz-redis:6379"
  BACKEND_INTERNAL_URL: http://localhost:3000
  TEMPORAL_ADDRESS: temporal:7233
  IS_GENERAL: "${IS_GENERAL:-true}"
  DISABLE_REGISTRATION: "${DISABLE_REGISTRATION:-false}"
  RUN_CRON: "${RUN_CRON:-true}"
  STORAGE_PROVIDER: "${STORAGE_PROVIDER:-local}"
  UPLOAD_DIRECTORY: "${UPLOAD_DIRECTORY:-/uploads}"
  NEXT_PUBLIC_UPLOAD_DIRECTORY: "${NEXT_PUBLIC_UPLOAD_DIRECTORY:-/uploads}"
  X_API_KEY: "${X_API_KEY:-}"
  X_API_SECRET: "${X_API_SECRET:-}"
  LINKEDIN_CLIENT_ID: "${LINKEDIN_CLIENT_ID:-}"
  LINKEDIN_CLIENT_SECRET: "${LINKEDIN_CLIENT_SECRET:-}"
  REDDIT_CLIENT_ID: "${REDDIT_CLIENT_ID:-}"
  REDDIT_CLIENT_SECRET: "${REDDIT_CLIENT_SECRET:-}"
  GITHUB_CLIENT_ID: "${GITHUB_CLIENT_ID:-}"
  GITHUB_CLIENT_SECRET: "${GITHUB_CLIENT_SECRET:-}"
  BEEHIIVE_API_KEY: "${BEEHIIVE_API_KEY:-}"
  BEEHIIVE_PUBLICATION_ID: "${BEEHIIVE_PUBLICATION_ID:-}"
  THREADS_APP_ID: "${THREADS_APP_ID:-}"
  THREADS_APP_SECRET: "${THREADS_APP_SECRET:-}"
  FACEBOOK_APP_ID: "${FACEBOOK_APP_ID:-}"
  FACEBOOK_APP_SECRET: "${FACEBOOK_APP_SECRET:-}"
  YOUTUBE_CLIENT_ID: "${YOUTUBE_CLIENT_ID:-}"
  YOUTUBE_CLIENT_SECRET: "${YOUTUBE_CLIENT_SECRET:-}"
  TIKTOK_CLIENT_ID: "${TIKTOK_CLIENT_ID:-}"
  TIKTOK_CLIENT_SECRET: "${TIKTOK_CLIENT_SECRET:-}"
  PINTEREST_CLIENT_ID: "${PINTEREST_CLIENT_ID:-}"
  PINTEREST_CLIENT_SECRET: "${PINTEREST_CLIENT_SECRET:-}"
  DRIBBBLE_CLIENT_ID: "${DRIBBBLE_CLIENT_ID:-}"
  DRIBBBLE_CLIENT_SECRET: "${DRIBBBLE_CLIENT_SECRET:-}"
  DISCORD_CLIENT_ID: "${DISCORD_CLIENT_ID:-}"
  DISCORD_CLIENT_SECRET: "${DISCORD_CLIENT_SECRET:-}"
  DISCORD_BOT_TOKEN_ID: "${DISCORD_BOT_TOKEN_ID:-}"
  SLACK_ID: "${SLACK_ID:-}"
  SLACK_SECRET: "${SLACK_SECRET:-}"
  SLACK_SIGNING_SECRET: "${SLACK_SIGNING_SECRET:-}"
  MASTODON_URL: "${MASTODON_URL:-https://mastodon.social}"
  MASTODON_CLIENT_ID: "${MASTODON_CLIENT_ID:-}"
  MASTODON_CLIENT_SECRET: "${MASTODON_CLIENT_SECRET:-}"
  OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
  NEXT_PUBLIC_DISCORD_SUPPORT: "${NEXT_PUBLIC_DISCORD_SUPPORT:-}"
  NEXT_PUBLIC_POLOTNO: "${NEXT_PUBLIC_POLOTNO:-}"
  API_LIMIT: "${API_LIMIT:-30}"
  FEE_AMOUNT: "${FEE_AMOUNT:-0.05}"
  STRIPE_PUBLISHABLE_KEY: "${STRIPE_PUBLISHABLE_KEY:-}"
  STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY:-}"
  STRIPE_SIGNING_KEY: "${STRIPE_SIGNING_KEY:-}"
  STRIPE_SIGNING_KEY_CONNECT: "${STRIPE_SIGNING_KEY_CONNECT:-}"
  NX_ADD_PLUGINS: "false"

services:
  postiz:
    image: ghcr.io/gitroomhq/postiz-app:latest
    restart: unless-stopped
    environment:
      <<: *postiz-environment
    volumes:
      - postiz-config:/config/
      - postiz-uploads:/uploads/
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "node", "-e", "const r=require('http').get('http://localhost:5000/',res=>process.exit(res.statusCode<500?0:1));r.on('error',()=>process.exit(1));r.setTimeout(4000,()=>{r.destroy();process.exit(1)})"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    depends_on:
      postiz-postgres:
        condition: service_healthy
      postiz-redis:
        condition: service_healthy
      temporal:
        condition: service_healthy

  postiz-postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: "${POSTIZ_POSTGRES_PASSWORD:?POSTIZ_POSTGRES_PASSWORD is required}"
      POSTGRES_USER: "${POSTIZ_POSTGRES_USER:-postiz-user}"
      POSTGRES_DB: "${POSTIZ_POSTGRES_DB:-postiz}"
    volumes:
      - postgres-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  postiz-redis:
    image: redis:7.2
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${POSTIZ_REDIS_PASSWORD:?POSTIZ_REDIS_PASSWORD is required}"]
    environment:
      REDIS_PASSWORD: "${POSTIZ_REDIS_PASSWORD:?POSTIZ_REDIS_PASSWORD is required}"
    volumes:
      - postiz-redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  spotlight:
    profiles: [debug]
    image: ghcr.io/getsentry/spotlight:latest
    pull_policy: always
    restart: unless-stopped

  temporal-elasticsearch:
    image: elasticsearch:7.17.27
    restart: unless-stopped
    environment:
      cluster.routing.allocation.disk.threshold_enabled: "true"
      cluster.routing.allocation.disk.watermark.low: 512mb
      cluster.routing.allocation.disk.watermark.high: 256mb
      cluster.routing.allocation.disk.watermark.flood_stage: 128mb
      discovery.type: single-node
      ES_JAVA_OPTS: -Xms256m -Xmx256m
      xpack.security.enabled: "false"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS \"http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s\" || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s
    volumes:
      - temporal-elasticsearch-data:/usr/share/elasticsearch/data

  temporal-postgresql:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: "${TEMPORAL_POSTGRES_PASSWORD:?TEMPORAL_POSTGRES_PASSWORD is required}"
      POSTGRES_USER: temporal
      POSTGRES_DB: temporal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal -d temporal"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - temporal-postgres-data:/var/lib/postgresql/data

  temporal:
    image: temporalio/auto-setup:1.28.1
    restart: unless-stopped
    depends_on:
      temporal-postgresql:
        condition: service_healthy
      temporal-elasticsearch:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_USER: temporal
      POSTGRES_PWD: "${TEMPORAL_POSTGRES_PASSWORD:?TEMPORAL_POSTGRES_PASSWORD is required}"
      POSTGRES_SEEDS: temporal-postgresql
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
      ENABLE_ES: "true"
      ES_SEEDS: temporal-elasticsearch
      ES_VERSION: v7
      TEMPORAL_NAMESPACE: default
    healthcheck:
      test: ["CMD", "temporal", "operator", "cluster", "health", "--address", "temporal:7233"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - ./dynamicconfig:/etc/temporal/config/dynamicconfig:ro

  temporal-admin-tools:
    profiles: [tools]
    image: temporalio/admin-tools:1.28.1-tctl-1.18.4-cli-1.4.1
    restart: on-failure
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CLI_ADDRESS: temporal:7233
    stdin_open: true
    tty: true
    depends_on:
      temporal:
        condition: service_healthy

  temporal-ui:
    profiles: [tools]
    image: temporalio/ui:2.34.0
    restart: unless-stopped
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: "${POSTIZ_URL:-https://postiz.con.fyi}"
    depends_on:
      temporal:
        condition: service_healthy

volumes:
  postgres-volume:
  postiz-redis-data:
  postiz-config:
  postiz-uploads:
  temporal-postgres-data:
  temporal-elasticsearch-data:
